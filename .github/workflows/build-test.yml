name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm run lint
      - run: npm run test:once
      - run: npm run build
