name: PR Pre-Merge Checks

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: 'read'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 24.x
        cache: 'npm'
    - name: Install npm dependencies
      run: npm ci
    - name: Run build
      run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 24.x
        cache: 'npm'
    - name: Install npm dependencies
      run: npm ci
    - name: Run typecheck
      run: npm run typecheck
    - name: Run lint
      run: npm run lint
    - name: Run tests
      run: npm run test:once
